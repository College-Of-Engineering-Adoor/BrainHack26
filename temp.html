<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Hack'26 | Maintenance</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap');
        
        body { 
            background-color: #050505; 
            color: #7692FF; 
            font-family: 'Montserrat', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            text-align: center;
            background-image: 
                linear-gradient(to right, rgba(61, 81, 140, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(61, 81, 140, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        .container {
            background: rgba(9, 21, 64, 0.6); 
            backdrop-filter: blur(16px);
            padding: 50px; 
            border-radius: 15px; 
            border: 1px solid rgba(118, 146, 255, 0.2);
            box-shadow: 0 15px 35px rgba(27, 44, 193, 0.3);
            max-width: 500px;
            width: 90%;
        }
        h1 { 
            margin-bottom: 15px; 
            font-size: 2.2rem; 
            color: #ABD2FA;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        p { 
            color: #E2E8F0; 
            font-size: 1.1rem; 
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚙️ System Updating</h1>
        <p>The <strong>Brain Hack'26</strong> portal is currently undergoing scheduled maintenance.</p>
        <p style="color: #3D518C; font-size: 0.9rem; margin-top: 20px;">Check back shortly.</p>
    </div>
</body>
</html>
